<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="faviconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Background Circle -->
    <circle cx="16" cy="16" r="15" fill="url(#faviconGrad)"/>
    
    <!-- Pill/Capsule Shape -->
    <g transform="translate(16, 16)">
        <!-- Left half -->
        <path d="M -5,-7 A 3,3 0 0,0 -5,7 L 0,7 L 0,-7 Z" fill="#ffffff" opacity="0.9"/>
        <!-- Right half -->
        <path d="M 0,-7 L 5,-7 A 3,3 0 0,1 5,7 L 0,7 Z" fill="#ffffff" opacity="0.7"/>
        <!-- Center line -->
        <line x1="0" y1="-7" x2="0" y2="7" stroke="#10b981" stroke-width="0.8"/>
        
        <!-- Rx Symbol -->
        <text x="-1.5" y="3" font-family="Georgia, serif" font-size="8" font-weight="bold" 
              fill="#10b981" font-style="italic">Rx</text>
    </g>
    
    <!-- Outer ring -->
    <circle cx="16" cy="16" r="15" fill="none" stroke="#065f46" stroke-width="1"/>
</svg>
